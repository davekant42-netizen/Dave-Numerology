<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>DAVE Numerology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== Design tokens — mirror src/index.css ===== */
  html.dark {
    --background: 220 20% 7%;
    --foreground: 40 20% 90%;
    --card: 220 18% 10%;
    --card-foreground: 40 20% 90%;
    --primary: 38 90% 55%;
    --primary-foreground: 220 20% 7%;
    --secondary: 220 15% 15%;
    --secondary-foreground: 40 15% 75%;
    --muted: 220 15% 13%;
    --muted-foreground: 220 10% 55%;
    --accent: 38 70% 45%;
    --border: 220 15% 18%;
    --ring: 38 90% 55%;
    --radius: .75rem;
    --gold-glow: 38 100% 65%;
    --md-color: 0 75% 58%;
    --ad-color: 265 75% 65%;
    --pd-color: 145 60% 48%;
    --dd-color: 38 95% 55%;
  }
  html.light {
    --background: 220 25% 97%;
    --foreground: 222 30% 12%;
    --card: 0 0% 100%;
    --card-foreground: 222 30% 12%;
    --primary: 222 80% 56%;
    --primary-foreground: 0 0% 100%;
    --secondary: 220 20% 94%;
    --secondary-foreground: 222 30% 18%;
    --muted: 220 20% 95%;
    --muted-foreground: 220 12% 45%;
    --accent: 222 80% 96%;
    --border: 220 18% 90%;
    --ring: 222 80% 56%;
    --radius: .75rem;
    --gold-glow: 38 100% 60%;
    --md-color: 0 75% 55%;
    --ad-color: 265 70% 58%;
    --pd-color: 145 55% 42%;
    --dd-color: 38 90% 50%;
  }

  *,*::before,*::after { box-sizing: border-box; border-color: hsl(var(--border)); }
  html, body { margin: 0; padding: 0; }
  body {
    background: hsl(var(--background));
    color: hsl(var(--foreground));
    font-family: 'Space Grotesk', system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .font-display { font-family: 'Space Grotesk', sans-serif; }

  /* Layout */
  header { border-bottom: 1px solid hsl(var(--border)); padding: 16px 24px; }
  .header-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .title { font-size: 20px; font-weight: 700; color: hsl(var(--primary)); letter-spacing: -.01em; margin: 0; }
  .subtitle { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 2px; }
  main { max-width: 1280px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 32px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; height: 32px; padding: 0 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid hsl(var(--border)); background: hsl(var(--card)); color: hsl(var(--foreground)); transition: background .15s, border-color .15s; }
  .btn:hover { background: hsl(var(--secondary)); }
  .btn.icon { width: 32px; padding: 0; justify-content: center; }
  .btn.primary { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); border-color: transparent; box-shadow: 0 10px 25px -10px hsl(var(--primary) / .5); }
  .btn.primary:hover { background: hsl(var(--primary) / .9); }

  /* Toggle group */
  .toggle-group { display: inline-flex; border: 1px solid hsl(var(--border)); background: hsl(var(--card)); border-radius: 6px; padding: 2px; gap: 2px; }
  .toggle-group button { background: transparent; border: 0; color: hsl(var(--foreground)); font: inherit; font-size: 12px; font-weight: 500; padding: 0 12px; height: 28px; border-radius: 4px; cursor: pointer; }
  .toggle-group button[aria-pressed="true"] { background: hsl(var(--primary)); color: hsl(var(--primary-foreground)); }

  /* Inputs */
  label.lbl { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: .15em; color: hsl(var(--muted-foreground)); margin-bottom: 6px; font-weight: 500; }
  input[type=text], input[type=date], input[type=number] {
    background: hsl(var(--card));
    color: hsl(var(--foreground));
    border: 1px solid hsl(var(--border));
    border-radius: 6px;
    padding: 8px 12px;
    font: inherit;
    font-size: 14px;
    outline: none;
    transition: box-shadow .15s, border-color .15s;
  }
  input:focus { box-shadow: 0 0 0 2px hsl(var(--ring) / .4); border-color: hsl(var(--ring)); }
  input[type=date] { font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  /* Cards & section headings */
  .card { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: var(--radius); padding: 16px; }
  .gold-glow { box-shadow: 0 0 20px -5px hsl(var(--primary) / .3); }
  .section-h { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .15em; color: hsl(var(--muted-foreground)); margin: 0 0 12px; }

  /* Summary grid */
  .summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  @media (min-width: 768px) { .summary-grid { grid-template-columns: repeat(4, 1fr); } }
  .summary-card .lbl-s { font-size: 11px; text-transform: uppercase; letter-spacing: .15em; color: hsl(var(--muted-foreground)); margin-bottom: 4px; }
  .summary-card .big { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; color: hsl(var(--primary)); line-height: 1; }
  .summary-card .name { font-size: 18px; font-weight: 700; color: hsl(var(--foreground)); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .summary-card .sub { font-size: 11px; color: hsl(var(--muted-foreground)); margin-top: 6px; }

  /* Vedic grid */
  .vgrid { display: grid; grid-template-columns: repeat(3, 64px); gap: 6px; }
  .vcell {
    position: relative; width: 64px; height: 64px;
    border: 1px solid hsl(var(--border)); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 14px;
    background: hsl(var(--card));
    color: hsl(var(--muted-foreground) / .4);
    transition: all .15s;
  }
  .vcell.active { background: hsl(var(--primary) / .2); border-color: hsl(var(--primary)); color: hsl(var(--primary)); box-shadow: 0 0 12px hsl(var(--primary) / .3); }
  .badges { position: absolute; top: -6px; right: -6px; display: flex; flex-direction: column; gap: 2px; z-index: 2; }
  .badge {
    min-width: 20px; height: 14px; padding: 0 4px; font-size: 8px; font-weight: 800; color: #fff;
    border-radius: 999px; display: inline-flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.4);
  }
  .b-md { background: hsl(var(--md-color)); }
  .b-ad { background: hsl(var(--ad-color)); }
  .b-pd { background: hsl(var(--pd-color)); }
  .b-dd { background: hsl(var(--dd-color)); }

  .legend-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
  .legend-pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 600; color: #fff; }

  /* Status grid */
  .status-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .status-card { padding: 12px 14px; border-radius: 8px; }
  .status-card .t { font-size: 11px; color: hsl(var(--muted-foreground)); }
  .status-card .v { font-size: 20px; font-weight: 700; margin-top: 2px; }
  .status-card .meta { font-size: 10px; color: hsl(var(--muted-foreground)); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .s-md { background: hsl(var(--md-color) / .1); border: 1px solid hsl(var(--md-color) / .3); }
  .s-md .v { color: hsl(var(--md-color)); }
  .s-ad { background: hsl(var(--ad-color) / .1); border: 1px solid hsl(var(--ad-color) / .3); }
  .s-ad .v { color: hsl(var(--ad-color)); }
  .s-pd { background: hsl(var(--pd-color) / .1); border: 1px solid hsl(var(--pd-color) / .3); }
  .s-pd .v { color: hsl(var(--pd-color)); }
  .s-dd { background: hsl(var(--dd-color) / .1); border: 1px solid hsl(var(--dd-color) / .3); }
  .s-dd .v { color: hsl(var(--dd-color)); }

  /* Tabs */
  .tabs-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; }
  .tablist { display: inline-flex; background: hsl(var(--muted)); padding: 4px; border-radius: 6px; gap: 2px; }
  .tablist button { background: transparent; border: 0; padding: 6px 14px; border-radius: 4px; font: inherit; font-size: 13px; font-weight: 500; color: hsl(var(--muted-foreground)); cursor: pointer; }
  .tablist button[aria-selected="true"] { background: hsl(var(--background)); color: hsl(var(--foreground)); box-shadow: 0 1px 3px rgba(0,0,0,.1); }

  .legend-inline { display: none; gap: 12px; align-items: center; }
  @media (min-width: 768px) { .legend-inline { display: inline-flex; } }
  .dot { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: hsl(var(--muted-foreground)); }
  .dot::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--dot-color); }

  /* Card-view grid */
  .cards-grid { display: grid; grid-template-columns: repeat(1, 1fr); gap: 16px; }
  @media (min-width: 640px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (min-width: 1024px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (min-width: 1280px) { .cards-grid { grid-template-columns: repeat(4, 1fr); } }
  .dcard { background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 12px; overflow: hidden; transition: box-shadow .15s; }
  .dcard:hover { box-shadow: 0 4px 12px rgba(0,0,0,.15); }
  .dcard.active { border-color: transparent; }
  .dcard-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: hsl(var(--secondary) / .5); }
  .dcard.active .dcard-head { color: #fff; }
  .dcard-head .h-title { font-weight: 600; font-size: 13px; }
  .dcard-head .h-sub { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: hsl(var(--muted-foreground)); }
  .dcard.active .dcard-head .h-sub { color: rgba(255,255,255,.85); }
  .dcard-body { padding: 14px; }
  .mini-vgrid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .mini-vcell { position: relative; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid hsl(var(--border)); border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 13px; background: hsl(var(--card)); color: hsl(var(--muted-foreground) / .4); }
  .mini-vcell.active { background: hsl(var(--primary) / .2); border-color: hsl(var(--primary)); color: hsl(var(--primary)); box-shadow: 0 0 12px hsl(var(--primary) / .3); }
  .mini-vcell .badges { top: -5px; right: -5px; }
  .card-footer { margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }

  /* Tables */
  .table-wrap { overflow-x: auto; border: 1px solid hsl(var(--border)); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: hsl(var(--secondary)); text-align: left; padding: 8px 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: hsl(var(--muted-foreground)); border-bottom: 1px solid hsl(var(--border)); }
  td { padding: 8px 12px; border-bottom: 1px solid hsl(var(--border)); color: hsl(var(--foreground)); }
  tr:last-child td { border-bottom: 0; }
  tr:hover td { background: hsl(var(--secondary) / .5); }
  tr.row-active td { background: hsl(var(--md-color) / .1) !important; }
  .pill { display: inline-flex; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; color: #fff; }
  .pill-md { background: hsl(var(--md-color)); }
  .pill-ad { background: hsl(var(--ad-color)); }
  .pill-pd { background: hsl(var(--pd-color)); }
  .pill-dd { background: hsl(var(--dd-color)); }

  .text-md { color: hsl(var(--md-color)); }
  .text-ad { color: hsl(var(--ad-color)); }
  .text-pd { color: hsl(var(--pd-color)); }
  .text-dd { color: hsl(var(--dd-color)); }
  .text-muted { color: hsl(var(--muted-foreground)); }

  /* Disclosure rows */
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  .nested-row { background: hsl(var(--secondary) / .3); }
  .chev { display: inline-block; width: 12px; height: 12px; transition: transform .2s; color: hsl(var(--muted-foreground)); }
  details[open] .chev { transform: rotate(90deg); }
  .inner-table { margin: 0; }
  .empty { padding: 64px; text-align: center; color: hsl(var(--muted-foreground)); font-size: 16px; }
  .row-flex { display: flex; flex-wrap: wrap; gap: 24px; align-items: flex-start; }
  .ml-auto { margin-left: auto; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <div class="header-inner">
    <div>
      <h1 class="title font-display">DAVE Numerology</h1>
      <p class="subtitle">Precision calculations • 120-Year Dasha</p>
    </div>
    <div style="display:flex; align-items:center; gap:12px;" id="header-controls">
      <button class="btn icon" id="themeToggle" aria-label="Toggle theme" title="Toggle theme">
        <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg id="iconMoon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="toggle-group hidden" id="viewToggle">
        <button data-view="grid" aria-pressed="true">Grid</button>
        <button data-view="table" aria-pressed="false">Table</button>
      </div>
    </div>
  </div>
</header>

<main>
  <!-- Inputs + Vedic Grid -->
  <div class="row-flex">
    <div style="display:flex; flex-direction:column; gap:12px;">
      <div>
        <label class="lbl">Name</label>
        <input type="text" id="name" placeholder="Enter name" style="width:224px;" />
      </div>
      <div>
        <label class="lbl">Date of Birth</label>
        <input type="date" id="dob" />
      </div>
      <p id="dobInfo" class="text-muted" style="font-size:13px;"></p>
    </div>
    <div id="vedicWrap" class="hidden">
      <label class="lbl">Vedic Grid</label>
      <div id="vedicGrid"></div>
    </div>
  </div>

  <!-- Core numbers -->
  <section id="coreSection" class="hidden">
    <h2 class="section-h">Core Numbers</h2>
    <div id="coreCards" class="summary-grid"></div>
  </section>

  <!-- Output -->
  <div id="output"></div>

  <div id="empty" class="empty">Enter Name &amp; Date of Birth to begin analysis</div>
</main>

<script>
/* ============ CORE NUMEROLOGY (mirrors src/lib/numerology.ts) ============ */
const PLANET_MAP = {1:'Sun',2:'Moon',3:'Jupiter',4:'Rahu',5:'Mercury',6:'Venus',7:'Ketu',8:'Saturn',9:'Mars'};
const WEEKDAY_VALUES = {0:1,1:2,2:9,3:5,4:3,5:6,6:8};

const reduceToSingle = n => { while (n > 9) n = String(n).split('').reduce((s,d)=>s+(+d),0); return n; };
const getRootNumber = d => { const x = d.getDate(); if (x===10) return 1; if (x===20) return 2; if (x===30) return 3; return reduceToSingle(x); };
const getDestinyNumber = d => reduceToSingle(d.getDate() + (d.getMonth()+1) + reduceToSingle(d.getFullYear()));
const getWeekdayValue = d => WEEKDAY_VALUES[d.getDay()];
const pad = n => String(n).padStart(2,'0');
const fmt = d => `${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;
const addYears = (d,y) => { const r = new Date(d); r.setFullYear(r.getFullYear()+y); return r; };
const addDays = (d,n) => { const r = new Date(d); r.setDate(r.getDate()+n); return r; };

function collectGridNumbers(dob) {
  const day = dob.getDate(), m = dob.getMonth()+1, y = dob.getFullYear(), sy = String(y).slice(2);
  const nums = [];
  for (const c of String(day)) nums.push(+c);
  for (const c of String(m)) nums.push(+c);
  for (const c of sy) nums.push(+c);
  if (day >= 10 && ![10,20,30].includes(day)) nums.push(getRootNumber(dob));
  nums.push(getDestinyNumber(dob));
  return nums;
}

function seqFrom(s) { const o=[s]; let n=s; for (let i=0;i<8;i++){ n = n===9?1:n+1; o.push(n);} return o; }

function calcMD(dob) {
  const seq = seqFrom(getRootNumber(dob)); const out = []; let cur = new Date(dob);
  for (const n of seq) { const e = addYears(cur, n); out.push({number:n, planet:PLANET_MAP[n], years:n, startDate:new Date(cur), endDate:e}); cur = e; }
  return out;
}

function calcAD(dob, years=120) {
  const rn = getRootNumber(dob), bm = dob.getMonth()+1; const out = [];
  for (let i=0;i<years;i++) {
    const ys = addYears(dob,i), ye = addYears(dob,i+1);
    const yr = ys.getFullYear(), l2 = yr%100;
    const dobInY = new Date(yr, dob.getMonth(), dob.getDate());
    const wv = getWeekdayValue(dobInY);
    const num = reduceToSingle(l2+bm+rn+wv);
    out.push({number:num, planet:PLANET_MAP[num], startDate:ys, endDate:ye, age:i, yearLabel:`${fmt(ys)} – ${fmt(ye)}`});
  }
  return out;
}

function calcPD(adNum, adStart) {
  const seq = seqFrom(adNum); const out = [];
  const y = adStart.getFullYear();
  const leap = (y%4===0 && y%100!==0) || (y%400===0);
  const bonus = new Array(9).fill(0);
  if (!leap) { bonus[2]++; bonus[4]++; bonus[6]++; bonus[8] += 2; }
  else       { bonus[1]++; bonus[3]++; bonus[5]++; bonus[7]++; bonus[8] += 2; }
  let cur = new Date(adStart);
  seq.forEach((n,i) => {
    const days = n*8 + bonus[i]; const e = addDays(cur, days);
    out.push({number:n, planet:PLANET_MAP[n], days, startDate:new Date(cur), endDate:e});
    cur = addDays(e, 1);
  });
  return out;
}

function buildDD(pd) {
  const out = []; const cur = new Date(pd.startDate); cur.setHours(0,0,0,0);
  const end = new Date(pd.endDate); end.setHours(0,0,0,0);
  while (cur < end) {
    const wn = getWeekdayValue(cur), t = pd.number+wn, dd = reduceToSingle(t);
    out.push({date:new Date(cur), weekday:cur.toLocaleDateString('en',{weekday:'long'}), wn, total:t, dd, planet:PLANET_MAP[dd]});
    cur.setDate(cur.getDate()+1);
  }
  return out;
}

function findCurrent(dob, mds, ads) {
  const now = Date.now();
  const md = mds.find(m => now>=m.startDate.getTime() && now<m.endDate.getTime());
  const ad = ads.find(a => now>=a.startDate.getTime() && now<a.endDate.getTime());
  let pd; if (ad) { const pds = calcPD(ad.number, ad.startDate); pd = pds.find(p => now>=p.startDate.getTime() && now<p.endDate.getTime()); }
  return {md, ad, pd};
}

/* ============ STATE ============ */
const state = { dob: null, name: '', view: 'grid', tab: 'mahadasha', theme: 'dark' };

/* ============ RENDER HELPERS ============ */
const GRID = [3,1,9,6,7,5,2,8,4];
const $ = id => document.getElementById(id);

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function badgesHtml(periods) {
  if (!periods.length) return '';
  return `<div class="badges">${periods.map(p => `<span class="badge b-${p}">${p.toUpperCase()}</span>`).join('')}</div>`;
}

function cellPeriodStyle(periods, active) {
  if (!periods.length) return '';
  const op = active ? .28 : .16;
  let bg;
  if (periods.length === 1) bg = `hsl(var(--${periods[0]}-color) / ${op})`;
  else {
    const stops = periods.map((p,i) => {
      const start = Math.round(i/periods.length*100);
      const end = Math.round((i+1)/periods.length*100);
      return `hsl(var(--${p}-color) / ${op}) ${start}% ${end}%`;
    }).join(', ');
    bg = `linear-gradient(135deg, ${stops})`;
  }
  return `background:${bg}; border-color:hsl(var(--${periods[0]}-color)); color:hsl(var(--${periods[0]}-color)); box-shadow:0 0 12px hsl(var(--${periods[0]}-color)/.35);`;
}

function renderVedicGrid(target, sourceNums, periodNums, small) {
  const counts = {};
  for (const n of sourceNums) if (n>=1 && n<=9) counts[n] = (counts[n]||0)+1;
  const periodMap = {};
  ['md','ad','pd','dd'].forEach(k => { const n = periodNums[k]; if (n!=null) (periodMap[n]=periodMap[n]||[]).push(k); });

  const cls = small ? 'mini-vcell' : 'vcell';
  const html = GRID.map(d => {
    const count = counts[d] || 0;
    const active = count > 0;
    const periods = periodMap[d] || [];
    const hasPeriod = periods.length > 0;
    const style = hasPeriod ? cellPeriodStyle(periods, active) : '';
    const baseCls = hasPeriod ? '' : (active ? 'active' : '');
    const text = active ? Array(count).fill(d).join(',') : d;
    return `<div class="${cls} ${baseCls}" style="${style}">${text}${badgesHtml(periods)}</div>`;
  }).join('');
  return `<div class="${small ? 'mini-vgrid' : 'vgrid'}">${html}</div>`;
}

function legendPills(periodNums) {
  const items = [];
  if (periodNums.md != null) items.push({k:'md', l:'MD', n:periodNums.md});
  if (periodNums.ad != null) items.push({k:'ad', l:'AD', n:periodNums.ad});
  if (periodNums.pd != null) items.push({k:'pd', l:'PD', n:periodNums.pd});
  if (periodNums.dd != null) items.push({k:'dd', l:'DD', n:periodNums.dd});
  if (!items.length) return '';
  return `<div class="legend-row">${items.map(i => `<span class="legend-pill" style="background:hsl(var(--${i.k}-color))">${i.l} ${i.n} • ${PLANET_MAP[i.n]}</span>`).join('')}</div>`;
}

/* ============ MAIN RENDER ============ */
function render() {
  const dob = state.dob;
  if (!dob) {
    $('empty').classList.remove('hidden');
    $('vedicWrap').classList.add('hidden');
    $('coreSection').classList.add('hidden');
    $('viewToggle').classList.add('hidden');
    $('output').innerHTML = '';
    $('dobInfo').textContent = '';
    return;
  }
  $('empty').classList.add('hidden');
  $('vedicWrap').classList.remove('hidden');
  $('coreSection').classList.remove('hidden');
  $('viewToggle').classList.remove('hidden');
  $('dobInfo').textContent = `${fmt(dob)} — ${dob.toLocaleDateString('en',{weekday:'long'})}`;

  const rn = getRootNumber(dob), dn = getDestinyNumber(dob), wv = getWeekdayValue(dob);
  const mds = calcMD(dob), ads = calcAD(dob);
  const cur = findCurrent(dob, mds, ads);
  const today = new Date();
  const todayWN = getWeekdayValue(today);
  const todayDD = cur.pd ? reduceToSingle(cur.pd.number + todayWN) : null;
  const periodNums = { md: cur.md?.number, ad: cur.ad?.number, pd: cur.pd?.number, dd: todayDD };

  // Vedic Grid
  $('vedicGrid').innerHTML = renderVedicGrid(null, collectGridNumbers(dob), periodNums, false) + legendPills(periodNums);

  // Core numbers
  $('coreCards').innerHTML = `
    <div class="card gold-glow summary-card"><div class="lbl-s">Name</div><div class="name">${escapeHtml(state.name||'—')}</div></div>
    <div class="card gold-glow summary-card"><div class="lbl-s">Root Number</div><div class="big">${rn}</div><div class="sub">Day ${dob.getDate()} → ${PLANET_MAP[rn]}</div></div>
    <div class="card gold-glow summary-card"><div class="lbl-s">Destiny Number</div><div class="big">${dn}</div><div class="sub">${PLANET_MAP[dn]}</div></div>
    <div class="card gold-glow summary-card"><div class="lbl-s">DOB Weekday</div><div class="big">${wv}</div><div class="sub">${dob.toLocaleDateString('en',{weekday:'long'})} → ${PLANET_MAP[wv]}</div></div>
  `;

  // Output: grid vs table
  if (state.view === 'grid') renderGridView(dob, mds, ads, periodNums, cur);
  else renderTableView(dob, mds, ads, cur, todayDD, today);
}

/* ============ GRID VIEW (DashaCardView) ============ */
function ageRange(dob, start, end) {
  const a1 = Math.max(0, Math.floor((start.getTime()-dob.getTime())/(365.25*86400000)));
  const a2 = Math.floor((end.getTime()-dob.getTime())/(365.25*86400000));
  return `${a1} – ${a2} yrs`;
}
function yearRange(s,e) { return `${s.getFullYear()} – ${e.getFullYear()}`; }
function buildMonths(ad) {
  const ms = ad.endDate.getTime() - ad.startDate.getTime();
  const seg = ms/12; const out = []; let n = ad.number;
  for (let i=0;i<12;i++) { out.push({number:n, planet:PLANET_MAP[n], start:new Date(ad.startDate.getTime()+seg*i), end:new Date(ad.startDate.getTime()+seg*(i+1))}); n = n===9?1:n+1; }
  return out;
}

function renderGridView(dob, mds, ads, periodNums, cur) {
  const now = Date.now();
  const tabs = `
    <div class="tabs-bar">
      <h2 class="section-h" style="margin:0;">Dasha Charts</h2>
      <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div class="legend-inline">
          <span class="dot" style="--dot-color:hsl(var(--md-color))">MD</span>
          <span class="dot" style="--dot-color:hsl(var(--ad-color))">AD</span>
          <span class="dot" style="--dot-color:hsl(var(--pd-color))">PD</span>
          <span class="dot" style="--dot-color:hsl(var(--dd-color))">DD</span>
        </div>
        <div class="tablist" id="tablist">
          <button data-tab="mahadasha" aria-selected="${state.tab==='mahadasha'}">Mahadasha</button>
          <button data-tab="yearly" aria-selected="${state.tab==='yearly'}">Yearly</button>
          <button data-tab="monthly" aria-selected="${state.tab==='monthly'}">Monthly</button>
          <button data-tab="daily" aria-selected="${state.tab==='daily'}">Daily</button>
        </div>
      </div>
    </div>
  `;

  const adsForCurrentMd = cur.md ? ads.filter(a => a.startDate.getTime() >= cur.md.startDate.getTime() && a.startDate.getTime() < cur.md.endDate.getTime()) : ads.slice(0,9);

  let body = '';
  const cardActiveStyle = (accent) => `border-color:transparent; box-shadow:0 0 0 2px hsl(var(--${accent}-color)/.6), 0 10px 25px -5px hsl(var(--${accent}-color)/.25);`;
  const cardHeadActiveStyle = (accent) => `background:hsl(var(--${accent}-color)); color:#fff;`;

  if (state.tab === 'mahadasha') {
    body = `<div class="cards-grid">${mds.map(m => {
      const isActive = now>=m.startDate.getTime() && now<m.endDate.getTime();
      const adsIn = ads.filter(a => a.startDate.getTime()>=m.startDate.getTime() && a.startDate.getTime()<m.endDate.getTime());
      return `<div class="dcard${isActive?' active':''}" style="${isActive?cardActiveStyle('md'):''}">
        <div class="dcard-head" style="${isActive?cardHeadActiveStyle('md'):''}">
          <div class="h-title">${yearRange(m.startDate, m.endDate)}</div>
          <div class="h-sub">${ageRange(dob, m.startDate, m.endDate)}</div>
        </div>
        <div class="dcard-body">
          ${renderVedicGrid(null, adsIn.map(a=>a.number), periodNums, true)}
          <div class="card-footer">${legendPills({md:m.number})}<span class="text-muted" style="font-size:11px;">${m.years}y</span></div>
        </div>
      </div>`;
    }).join('')}</div>`;
  } else if (state.tab === 'yearly') {
    body = `<div class="cards-grid">${adsForCurrentMd.map(a => {
      const isActive = now>=a.startDate.getTime() && now<a.endDate.getTime();
      const pds = calcPD(a.number, a.startDate);
      return `<div class="dcard${isActive?' active':''}" style="${isActive?cardActiveStyle('ad'):''}">
        <div class="dcard-head" style="${isActive?cardHeadActiveStyle('ad'):''}">
          <div class="h-title">Age ${a.age}</div>
          <div class="h-sub">${a.yearLabel}</div>
        </div>
        <div class="dcard-body">
          ${renderVedicGrid(null, pds.map(p=>p.number), periodNums, true)}
          <div class="card-footer">${legendPills({ad:a.number})}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  } else if (state.tab === 'monthly') {
    body = `<div class="cards-grid">${adsForCurrentMd.map(a => {
      const isActive = now>=a.startDate.getTime() && now<a.endDate.getTime();
      const months = buildMonths(a);
      return `<div class="dcard${isActive?' active':''}" style="${isActive?cardActiveStyle('ad'):''}">
        <div class="dcard-head" style="${isActive?cardHeadActiveStyle('ad'):''}">
          <div class="h-title">Age ${a.age} — Monthly</div>
          <div class="h-sub">${a.yearLabel}</div>
        </div>
        <div class="dcard-body">
          ${renderVedicGrid(null, months.map(m=>m.number), periodNums, true)}
          <div class="card-footer">${legendPills({ad:a.number})}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  } else {
    body = `<div class="cards-grid">${adsForCurrentMd.map(a => {
      const isActive = now>=a.startDate.getTime() && now<a.endDate.getTime();
      const pds = calcPD(a.number, a.startDate);
      return `<div class="dcard${isActive?' active':''}" style="${isActive?cardActiveStyle('pd'):''}">
        <div class="dcard-head" style="${isActive?cardHeadActiveStyle('pd'):''}">
          <div class="h-title">Age ${a.age} — Daily</div>
          <div class="h-sub">${a.yearLabel}</div>
        </div>
        <div class="dcard-body">
          ${renderVedicGrid(null, pds.map(p=>p.number), periodNums, true)}
          <div class="card-footer">${legendPills({ad:a.number})}</div>
        </div>
      </div>`;
    }).join('')}</div>`;
  }

  $('output').innerHTML = tabs + body;
  document.querySelectorAll('#tablist button').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });
}

/* ============ TABLE VIEW (DashaTable) ============ */
function renderTableView(dob, mds, ads, cur, todayDD, today) {
  const now = Date.now();
  const status = cur.md ? `
    <section class="card" style="padding:20px;">
      <h3 class="section-h">Current Status — ${fmt(today)}</h3>
      <div class="status-grid">
        <div class="status-card s-md"><div class="t">Mahadasha</div><div class="v">${cur.md.number} — ${cur.md.planet}</div></div>
        ${cur.ad?`<div class="status-card s-ad"><div class="t">Antardasha</div><div class="v">${cur.ad.number} — ${cur.ad.planet}</div></div>`:''}
        ${cur.pd?`<div class="status-card s-pd"><div class="t">Pratyantar Dasha</div><div class="v">${cur.pd.number} — ${cur.pd.planet}</div></div>`:''}
        ${todayDD?`<div class="status-card s-dd"><div class="t">Daily Dasha</div><div class="v">${todayDD} — ${PLANET_MAP[todayDD]}</div><div class="meta">${today.toLocaleDateString('en',{weekday:'long'})} • ${fmt(today)}</div></div>`:''}
      </div>
    </section>
  ` : '';

  const mdActive = mds.filter(m => now>=m.startDate.getTime() && now<m.endDate.getTime());
  const adActive = ads.filter(a => now>=a.startDate.getTime() && now<a.endDate.getTime());

  const mdRows = mdActive.map(m => `
    <tr class="row-active">
      <td class="font-mono text-md" style="font-weight:700; background:hsl(var(--md-color)/.15)">${m.number}</td>
      <td class="text-md" style="font-weight:700; background:hsl(var(--md-color)/.15)">${m.planet}</td>
      <td class="font-mono">${m.years}y</td>
      <td class="font-mono" style="font-size:12px;">${fmt(m.startDate)}</td>
      <td class="font-mono" style="font-size:12px;">${fmt(m.endDate)}</td>
      <td><span class="pill pill-md">Active</span></td>
    </tr>
  `).join('');

  const adRows = adActive.map((a, ai) => {
    const pds = calcPD(a.number, a.startDate);
    const pdRows = pds.map((p, pi) => {
      const pAct = now>=p.startDate.getTime() && now<p.endDate.getTime();
      const dds = buildDD(p);
      const ddRows = dds.map(d => {
        const isToday = d.date.toDateString() === today.toDateString();
        return `<tr${isToday?' class="row-active"':''}>
          <td class="font-mono" style="font-size:12px;">${fmt(d.date)}</td>
          <td>${d.weekday}</td>
          <td class="font-mono">${d.wn}</td>
          <td class="font-mono">${d.total}</td>
          <td><span class="pill pill-dd">${d.dd}</span> ${d.planet}</td>
        </tr>`;
      }).join('');
      return `<tr class="nested-row"><td colspan="6" style="padding:0;">
        <details ${pAct?'open':''}>
          <summary style="padding:8px 16px; display:flex; align-items:center; gap:8px;">
            <span class="chev">▸</span>
            <span style="font-size:12px;">PD ${pi+1}: <span class="pill pill-pd">${p.number}</span> ${p.planet} • <span class="font-mono text-muted">${fmt(p.startDate)} – ${fmt(p.endDate)}</span> (${p.days}d)</span>
            ${pAct?'<span class="pill pill-pd" style="margin-left:auto;">Active</span>':''}
          </summary>
          <div style="padding:0 16px 12px 32px;">
            <div class="table-wrap" style="max-height:320px; overflow-y:auto;">
              <table class="inner-table">
                <thead><tr><th>Date</th><th>Weekday</th><th>WD#</th><th>Sum</th><th>Daily Dasha</th></tr></thead>
                <tbody>${ddRows}</tbody>
              </table>
            </div>
          </div>
        </details>
      </td></tr>`;
    }).join('');
    return `
      <tr class="row-active">
        <td>Age ${a.age}</td>
        <td><span class="pill pill-ad">${a.number}</span></td>
        <td class="text-ad" style="font-weight:700;">${a.planet}</td>
        <td class="font-mono" style="font-size:12px;">${a.yearLabel}</td>
        <td><span class="pill pill-ad">Active</span></td>
      </tr>
      ${pdRows}
    `;
  }).join('');

  $('output').innerHTML = `
    ${status}
    <section>
      <h3 class="section-h">Mahadasha (Current)</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>#</th><th>Planet</th><th>Years</th><th>Start</th><th>End</th><th>Status</th></tr></thead>
          <tbody>${mdRows || '<tr><td colspan="6" class="empty">No active MD</td></tr>'}</tbody>
        </table>
      </div>
    </section>
    <section style="margin-top:32px;">
      <h3 class="section-h">Antardasha → Pratyantar → Daily Dasha</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Age</th><th>#</th><th>Planet</th><th>Period</th><th>Status</th></tr></thead>
          <tbody>${adRows || '<tr><td colspan="5" class="empty">No active AD</td></tr>'}</tbody>
        </table>
      </div>
    </section>
  `;
}

/* ============ EVENT WIRING ============ */
$('dob').addEventListener('change', e => {
  const v = e.target.value;
  if (!v) { state.dob = null; render(); return; }
  const d = new Date(v + 'T00:00:00');
  state.dob = isNaN(d.getTime()) ? null : d;
  render();
});
$('name').addEventListener('input', e => { state.name = e.target.value; render(); });

document.querySelectorAll('#viewToggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    state.view = btn.dataset.view;
    document.querySelectorAll('#viewToggle button').forEach(b => b.setAttribute('aria-pressed', b===btn));
    render();
  });
});

$('themeToggle').addEventListener('click', () => {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  document.documentElement.classList.toggle('dark', state.theme==='dark');
  document.documentElement.classList.toggle('light', state.theme==='light');
  $('iconSun').classList.toggle('hidden', state.theme!=='dark');
  $('iconMoon').classList.toggle('hidden', state.theme!=='light');
});

// Initial render
render();
</script>
</body>
</html>
